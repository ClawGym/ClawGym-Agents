apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      containers:
      - name: node-exporter
        image: quay.io/prometheus/node-exporter:v1.6.1
---
apiVersion: v1
kind: Pod
metadata:
  name: helper
spec:
  containers:
  - name: toolbox
    image: docker.io/library/busybox:1.36
