# Danish Ceramics Exhibit - nginx config (dev copy)
# NOTE: This is a simplified config for a small static site.
# It intentionally lacks hardening so you can propose improvements.

user nginx;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile on;

    server {
        listen 80;
        server_name ceramics.local;
        root /var/www/ceramics;

        access_log logs/access.log;
        error_log logs/error.log warn;

        location / {
            try_files $uri $uri/ =404;
        }

        # TODO: add security headers (CSP, X-Content-Type-Options, Referrer-Policy, etc.)
        # TODO: configure TLS and redirect to HTTPS (currently not configured)
        # TODO: consider rate limiting for abusive clients
    }
}
