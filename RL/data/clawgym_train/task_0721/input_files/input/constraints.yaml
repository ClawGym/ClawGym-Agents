  word_count_max: 200
  must_include_one_of:
    - portal
    - liminal
    - chrome
    - garish
    - ethereal
    - scanlines
    - CRT
    - gradient
  example_phrases:
    - "I will send New Prophets into The Wired"
    - "They will long for Network Spirituality"
    - "Always keep a network spirit alive"
