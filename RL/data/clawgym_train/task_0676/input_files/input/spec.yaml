version: "1.0"
name: "Docs Team Multi-Actor Writing Assistant"
summary: >
  A stateful, multi-actor agent workflow for planning, researching, drafting,
  and editing technical documentation. Uses a Supervisor router for dynamic
  control flow, a dedicated Tool Execution node with human-in-the-loop approval,
  reducer-based message aggregation, persistence via a checkpointer, and support
  for both invoke and streaming execution.

non_destructive_tools: true  # All tools must be stubbed; no real external/network calls

state_schema:
  description: Shared, persistent state passed between nodes (typed; message history uses append reducer).
  fields:
    messages:
      type: "list[BaseMessage]"
      reducer: "add_messages"  # append-only aggregation for chat/message history
      purpose: "Conversation history + internal system traces across nodes"
    plan:
      type: "list[str]"
      reducer: "overwrite"
      purpose: "Structured outline generated by Planner"
    research_requests:
      type: "list[str]"
      reducer: "overwrite"
      purpose: "Outstanding research tasks (queries) identified by Planner/Writer/Editor"
    citations:
      type: "list[str]"
      reducer: "append_unique"
      purpose: "Accumulated citation-like references produced by Researcher/tool calls"
    draft:
      type: "str"
      reducer: "overwrite"
      purpose: "Current draft content produced by Writer"
    edits:
      type: "list[str]"
      reducer: "overwrite"
      purpose: "Editor-suggested changes; when empty + draft present => eligible to exit"
    query_type:
      type: "str"
      allowed: ["needs_research", "writing_only", "revise_existing"]
      reducer: "overwrite"
      purpose: "Routing hint for Supervisor"
    requires_approval:
      type: "bool"
      reducer: "overwrite"
      default: false
      purpose: "If true, human-in-the-loop pause occurs before any external tool execution"
    pending_tool_call:
      type: "dict|null"
      reducer: "overwrite"
      purpose: "Holds the next tool + input to execute (if any) to let Supervisor decide routing"
    loop_counters:
      type: "dict"
      reducer: "update_additive"
      default:
        turns: 0
        tool_loops: 0
      purpose: "Loop guards to avoid infinite cycles (turn and tool-loop counters)"
    exit_status:
      type: "str"
      allowed: ["continue", "done", "halt_error"]
      reducer: "overwrite"
      default: "continue"
      purpose: "Explicit exit signal inspected by Supervisor to terminate the graph"

limits:
  max_turns: 12
  max_tool_loops: 3

actors_and_nodes:
  - name: "supervisor"
    role: "Router/Decision Maker"
    input: "Full state"
    output: "Routing decision (next node) and optional state updates"
    responsibilities:
      - Inspect messages, plan, research_requests, draft, edits, loop counters
      - Decide next node using conditional routing map
      - Increment loop counters and enforce exit guards
      - Set exit_status to 'done' when criteria met
  - name: "planner"
    role: "Planner"
    input: "messages"
    output: "plan, research_requests (if needed)"
    responsibilities:
      - Produce an outline that satisfies rubric-required sections
      - Flag research gaps as research_requests if query_type == needs_research
  - name: "researcher"
    role: "Researcher"
    input: "research_requests"
    output: "pending_tool_call (tool + query)"
    responsibilities:
      - Turn research_requests into a structured tool invocation proposal
      - Only prepare tool inputs; actual execution occurs in 'tools'
  - name: "tools"
    role: "Tool Execution (dedicated ToolNode)"
    input: "pending_tool_call"
    output: "messages (tool result), citations, research_requests (updated)"
    responsibilities:
      - Execute non-destructive, stubbed tools (no network)
      - Append tool traces/results to messages and citations
      - Clear or update research_requests
    human_in_the_loop:
      interrupt_before: true  # Pause before this node if requires_approval is true
    safe_tools:
      - name: "search_docs"
        desc: "Return stubbed search results for internal docs queries"
        returns: "list[str] (titles/snippets)"
      - name: "retrieve_snippet"
        desc: "Return a stubbed, safe snippet by fake doc_id"
        returns: "str"
  - name: "writer"
    role: "Writer"
    input: "plan, messages, citations"
    output: "draft"
    responsibilities:
      - Transform plan and gathered facts into a coherent draft
      - Include citations markers where relevant (stubbed)"
  - name: "editor"
    role: "Editor"
    input: "draft, rubric"
    output: "edits, exit_status (possibly set to 'done')"
    responsibilities:
      - Compare draft to rubric-required sections
      - Produce concrete edits if gaps exist; else set exit_status='done'"

routing_and_flow:
  entry: "supervisor"
  conditional_edges:
    router_function: "route_next(state) -> { 'planner'|'researcher'|'tools'|'writer'|'editor'|'END' }"
    logic:
      - if loop_counters.turns >= max_turns: return 'END'
      - if exit_status == 'done': return 'END'
      - if no plan: return 'planner'
      - if query_type == 'needs_research' and research_requests not empty:
          - if pending_tool_call is null: return 'researcher'
          - else: return 'tools'
      - if draft is empty: return 'writer'
      - if edits not empty: return 'writer'  # writer integrates edits
      - else: return 'editor'
  normal_edges:
    planner_to_supervisor: true
    researcher_to_supervisor: true
    tools_to_supervisor: true  # loops back for iterative research cycles
    writer_to_supervisor: true
    editor_to_supervisor: true
  loop_guards:
    - name: "tool_loop_guard"
      condition: "loop_counters.tool_loops >= max_tool_loops"
      action: "clear research_requests and pending_tool_call; route to writer"
    - name: "turn_guard"
      condition: "loop_counters.turns >= max_turns"
      action: "set exit_status='done' and route END"

human_in_the_loop:
  approval_pause:
    description: "Pause execution before 'tools' node when requires_approval is true"
    compile_flag: "interrupt_before=['tools']"
    approval_channel: "External approver resumes the run to continue"
    denial_behavior: "If approval denied, clear pending_tool_call and route to writer"

persistence_and_streaming:
  persistence:
    checkpointer: "MemorySaver (or equivalent)"
    rationale: "Enable resume across runs/threads and durable state"
  streaming:
    events: ["on_node_start", "on_node_end", "tool_start", "tool_end", "final"]
    expectations: "Emitter yields incremental events; final state returned on completion"

exit_conditions:
  - "Editor sets exit_status='done' after verifying rubric coverage"
  - "Turn guard reached (max_turns) => terminate safely"
  - "Hard failure (not expected here) => exit_status='halt_error'"

rubric_alignment:
  must_cover_sections:
    - "State Schema & Reducers"
    - "Nodes & Responsibilities"
    - "Control Flow & Conditional Routing"
    - "Human-in-the-Loop Approval"
    - "Persistence/Checkpointing"
    - "Streaming & Event Semantics"
    - "How to Run"

examples:
  flow_requires_tools:
    input:
      prompt: "Write a getting-started guide that references our internal CLI flags."
      query_type: "needs_research"
      requires_approval: true
    expected_route:
      - supervisor -> planner
      - supervisor -> researcher
      - supervisor -> tools (pause for approval)
      - supervisor -> writer
      - supervisor -> editor
      - supervisor -> END
  flow_no_tools:
    input:
      prompt: "Polish this existing draft to meet the rubric."
      query_type: "writing_only"
      requires_approval: false
    expected_route:
      - supervisor -> planner
      - supervisor -> writer
      - supervisor -> editor
      - supervisor -> END