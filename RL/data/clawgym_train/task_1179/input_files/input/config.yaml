# Self-Improvement Log Configuration
id_date: "20250115"          # Use this exact date in IDs: TYPE-YYYYMMDD-XXX
timezone: "UTC"

id_numbering:
  start: "001"               # Three-digit starting number
  width: 3                   # Pad IDs to three digits
  strategy: sequential_per_day

types:
  learning: "LRN"
  error: "ERR"
  feature: "FEAT"

guidance:
