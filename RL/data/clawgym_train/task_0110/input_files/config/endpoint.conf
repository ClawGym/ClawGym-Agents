[dhcp]
send_hostname = true
send_fqdn = true
randomize_clientid = false
parameter_request_list = ["subnet-mask","router","domain-name","domain-name-servers","host-name","client-id","vendor-class-identifier"]
send_vendor_class = true

[net]
enable_pfs = false
disable_tls_versions = ["TLSv1.0","TLSv1.1","TLSv1.2"]
