name: CI
on:
  push:
    branches: [ main ]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build image
        run: |
          docker build --build-arg SECRET_API_KEY=${{ secrets.COMMUNITY_API_TOKEN }} -t yserv:latest .
      - name: Run tests
        run: |
          pytest -q
