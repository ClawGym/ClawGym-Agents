# ===============================
# STRUCTURING PROMPT – TRK / ILR
# ===============================

# Description for user:
# This prompt is used to instruct ARK System in creating or refining a new tracer (TRK) or inferential rule (ILR).
# It is optimized to ensure coherence with ARK's operational axis, prevent ambiguity, and maintain complete computational structure.
# Use it every time you want to create a formal element of the logical system.

structural_prompt_TRK_or_ILR:
  type: [TRK | ILR]                    # Mandatory. Specify if you are creating a TRK or an ILR
  name: <synthetic title>             # Mandatory. Should be clear, descriptive, and concise
  objective: >
    <Synthetic description of the computational purpose of the rule or tracer.
    Must answer: "What does it prevent or what does it enable?" in a functional way.>
  application_context: >
    <Where does it activate? In which axis (e.g., OP, EX, IDP)? Is it general or local?
    Is it always active or bound to certain conditions?>
  directive_logic: >
    <What type of behavior does it impose? Constrain? Control? Correct?
    Clearly indicate if it acts on input, process, or output.>
  activation_criteria:
    - <Clearly computable condition 1>
    - <Clearly computable condition 2>
  constraints:
    - <What is forbidden? Under what conditions can it not activate?>
    - <What behaviors must it block?>
  operational_examples:
    - case: "<phrase or situation>"
      analysis: "<Why it is compliant or non-compliant>"
      compliant: [true | false]
  conflicts:
    - <Which TRK/ILR can this collide with?>
    - <What type of friction does it produce if poorly activated?>
  linked_tracers:
    activators:
      - <List of TRK/ILR that can activate this>
    validators:
      - <Who verifies its effectiveness?>
    correctors:
      - <Who corrects it in case of error?>

  # ===============================
  # USAGE EXAMPLE:
  # ===============================
  # I want to create a new ILR that prevents excessive deviations when a binary question is posed.
  # I will write:

  # structural_prompt_TRK_or_ILR:
  #   type: ILR
  #   name: Binary deductive stability
  #   objective: >
  #     Prevent a logical system from moving away from the optimal trajectory
  #     during binary deduction exercises, preventing non-computable drifts.
  #   application_context: >
  #     Active in all games or procedures based on binary answers. Priority on OP axis.
  #   directive_logic: >
  #     Block ambiguities, redundancies, and thematic deviations in questions.
  #   activation_criteria:
  #     - Misalignment detected between binary sequence and inferential behavior
  #     - Generated question with implicit ambiguity
  #   constraints:
  #     - Forbidden to introduce hypothetical or heuristic questions during binary exercises
  #     - Forbidden to add options unless explicitly requested
  #   operational_examples:
  #     - case: "Were you referring to an abstract or concrete object?"
  #       analysis: "Thematic ambiguity + double hypothesis"
  #       compliant: false
  #     - case: "Is it an inanimate object?"
  #       analysis: "Binary, direct, and computable question"
  #       compliant: true
  #   conflicts:
  #     - With TRK/EX-VSL: if a false wave is maintained for adaptation
  #   linked_tracers:
  #     activators:
  #       - TRK/CTX-COHERENCE
  #     validators:
  #       - TRK/OP-I
  #     correctors:
  #       - ILR_015
  #       - MODE/RE-AXIS

___________________________________________________

