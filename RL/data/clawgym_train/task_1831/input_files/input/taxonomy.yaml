  examples:
    - email_1_hero
    - teaser_video
    - text_post
    - rsa_1
    - expanded_text_ad_2
  rules:
    - Use lowercase and underscores
    - Include simple variant numbering when applicable (e.g., _1, _2)
term_guidance:
  usage: "Primarily for paid search keywords"
  examples:
    - tax_optimizer_software
    - budget_planner
privacy:
  note: "UTM parameters must never include PII. Use campaign metadata only."
consent:
  note: "Ensure pixels are gated behind user consent where required by local regulations."