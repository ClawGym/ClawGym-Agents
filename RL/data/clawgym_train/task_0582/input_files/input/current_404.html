<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>404 Not Found - PulseHub</title>
  <!-- Problem: No mobile viewport -->
  <!-- Problem: Robots incorrectly allow indexing on a 404 -->
  <meta name="robots" content="index, follow">
  <!-- Problem: Meta refresh auto-redirects to home (undesirable UX for 404) -->
  <meta http-equiv="refresh" content="5; url=/">
  <style>
    /* Problem: Off-brand colors and low contrast */
    body { font-family: Arial, sans-serif; background:#fafafa; color:#777; }
    .box { max-width: 640px; margin: 60px auto; padding: 24px; text-align: center; border: 1px solid #ddd; }
    h1 { color: #d42b2b; } /* bright red not in brand palette */
    a.btn { display:inline-block; padding:10px 14px; background:#ff9900; color:#fff; text-decoration:none; border-radius:2px; }
    .small { font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <!-- Problem: No header/footer continuity, no nav landmarks -->
  <div class="box">
    <h1>404 - Page not found</h1>
    <p>We couldn't find what you were looking for. Try checking the URL.</p>
    <!-- Problem: Only one path out; no search; no popular links -->
    <p><a class="btn" href="/">Go Home</a></p>
    <!-- Problem: Suggests blame subtly, limited guidance -->
    <p class="small">If you typed the address, double-check for typos.</p>
    <!-- Problem: Back link using history with no fallback -->
    <p><a href="javascript:history.back()">Go Back</a></p>
  </div>
  <!-- Problem: No accessibility hints, no role="main", no search, no status link -->
</body>
</html>
