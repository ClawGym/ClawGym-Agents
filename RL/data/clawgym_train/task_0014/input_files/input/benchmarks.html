<!doctype html>
<html>
<head><meta charset="utf-8"><title>Sustainability Benchmarks</title></head>
<body>
  <h1>Waste Diversion Classification</h1>
  <table id="waste-diversion">
    <thead><tr><th>Category</th><th>Diversion Rate</th></tr></thead>
    <tbody>
      <tr><td>Green</td><td>&gt;= 80%</td></tr>
      <tr><td>Yellow</td><td>50% to &lt; 80%</td></tr>
      <tr><td>Red</td><td>&lt; 50%</td></tr>
    </tbody>
  </table>

  <h1>Energy Intensity Classification</h1>
  <table id="energy-intensity">
    <thead><tr><th>Category</th><th>kWh per Attendee</th><th>Points</th></tr></thead>
    <tbody>
      <tr><td>Excellent</td><td>&lt;= 1.5</td><td>100</td></tr>
      <tr><td>Good</td><td>&gt; 1.5 and &lt;= 3.0</td><td>70</td></tr>
      <tr><td>Fair</td><td>&gt; 3.0 and &lt;= 5.0</td><td>40</td></tr>
      <tr><td>Poor</td><td>&gt; 5.0</td><td>10</td></tr>
    </tbody>
  </table>
</body>
</html>
