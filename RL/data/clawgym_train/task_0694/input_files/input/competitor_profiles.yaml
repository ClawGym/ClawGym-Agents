- name: Maintainly UK
  region: UK
  pricing_gbp_per_vehicle:
    basic: 9
    pro: 13
  implementation_fee_gbp: 1500
  typical_contract_length_months: 24
  positioning: "Mid-tier UK incumbent with strong regional networks and service bureaus"
  strengths:
    - Deep UK compliance templates
    - Strong partner network for implementation
    - Solid Geotab/Samsara integrations
  weaknesses:
    - UI dated vs modern SaaS
    - Limited predictive analytics
  feature_gaps_vs_FleetIQ:
    - "Predictive maintenance based on ML models"
    - "Technician mobile offline mode parity"
  integrations:
    - Geotab
    - Samsara
    - Sage
  market_share_uk_pct: 14
  discounting_pattern: "10–15% for annual prepay"
  notes: "Aggressive on multi-year deals; offers migration from legacy CMMS at low cost."

- name: FleetFix Pro
  region: UK
  pricing_gbp_per_vehicle:
    basic: 7
    pro: 11
  implementation_fee_gbp: 500
  typical_contract_length_months: 12
  positioning: "Value/budget player targeting SMB and small regional fleets"
  strengths:
    - Fast time-to-value
