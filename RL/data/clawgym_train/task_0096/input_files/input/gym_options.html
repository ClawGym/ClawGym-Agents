<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Gym Options</title></head>
  <body>
    <section id="gyms">
      <article class="gym" data-chain="FlexFit">
        <h2>FlexFit</h2>
        <div class="plans">
          <div class="plan" data-name="Basic" data-monthly="$55"></div>
          <div class="plan" data-name="Plus" data-monthly="$70"></div>
        </div>
        <ul class="cities">
          <li>Boston</li>
          <li>Chicago</li>
          <li>San Francisco</li>
        </ul>
        <p class="hours">Hours: 5am–11pm</p>
        <p class="pool">Pool: No</p>
        <p class="dropin">Drop-in: $12</p>
      </article>
      <article class="gym" data-chain="CityPower">
        <h2>CityPower</h2>
        <div class="plans">
          <div class="plan" data-name="Core" data-monthly="$65"></div>
          <div class="plan" data-name="Elite" data-monthly="$85"></div>
        </div>
        <ul class="cities">
          <li>New York</li>
          <li>Boston</li>
          <li>San Francisco</li>
          <li>Seattle</li>
        </ul>
        <p class="hours">Hours: 24/7</p>
        <p class="pool">Pool: Yes (select locations)</p>
        <p class="dropin">Drop-in: $15</p>
      </article>
    </section>
  </body>
</html>
