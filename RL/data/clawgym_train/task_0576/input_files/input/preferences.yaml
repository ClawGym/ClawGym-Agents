budget_cap_usd: 80000
theme: "Futuristic minimalism in Asteria blue (#1363DF) and silver"
dress_code: "Smart business casual with a touch of Asteria blue."
must_haves:
  - "LED wall backdrop (approx. 24'x10') for reveal"
  - "Six live demo stations with power and hardline internet"
  - "High-speed Wi-Fi (1 Gbps down / 500 Mbps up minimum)"
  - "Livestream to YouTube and internal portal (1080p)"
  - "Accessible seating and ramps; ADA-compliant restrooms"
  - "QR code check-in with on-site badge printing"
  - "Vegan and gluten-free food options (≥25% of menu)"
  - "Same-day 60–90s highlight reel (edited on-site)"
  - "Branded swag (enamel pins + reusable totes)"
av_requirements:
  - "2x wireless handheld mics + 2x lavaliers"
  - "Stage wash lighting + backlight"
  - "Confidence monitor for presenter notes"
  - "HDMI/SDI redundancy; playback from dual laptops"
  - "Stage manager comms"
catering_preferences:
  - "Heavy hors d'oeuvres (passed + stations)"
  - "Signature mocktail/cocktail in Asteria blue hue"
  - "Non-alcoholic options prominently featured"
  - "Sustainable serviceware (reusable/compostables)"
photography_requirements: "Two photographers + same-day editor for 60–90s highlight reel"