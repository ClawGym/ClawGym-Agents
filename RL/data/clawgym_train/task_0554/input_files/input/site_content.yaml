      steps:
        - "Run the command with --verbose and capture output."
        - "Include acme --version and your OS information."
        - "Attach minimal repro steps or a small sample project."
    acknowledgements:
      - "Thanks to the Internal Tools Guild for early testing and feedback."
      - "Special thanks to CI Platform for integration guidance."