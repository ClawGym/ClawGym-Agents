naming:
  lowercase: true
  separator: "_"
  allowed_chars_pattern: "^[a-z0-9_]+$"
  spaces_to_underscores: true
  trim_extra_underscores: true
  replacements:
    "&": "and"
    "+": "plus"
    "/": "_"
    ".": "_"
validation:
  disallow:
    - "@"
    - "http"
    - "?"
    - "#"
    - " "
  notes: "No PII in any utm_* values. Do not include user emails, full names, phone numbers, or IDs."
utm_parameters:
  required:
    - utm_source
    - utm_medium
    - utm_campaign
  optional:
    - utm_content
    - utm_term
campaign_naming:
  pattern: "{product}_{initiative}_{timeframe}"
  examples:
    - dsl_april_mini_launch_wk_1
    - dsl_april_mini_launch_nonbrand
  rules:
    - Use lowercase and underscores only
    - No dates with slashes; prefer week or month labels (e.g., wk_1, apr2026)
    - No PII or internal codes that reveal identities
