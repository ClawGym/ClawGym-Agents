<!doctype html>
<html>
<head><meta charset="utf-8"><title>Sunset Meditation Circle — RSVP</title></head>
<body>
  <h1>Sunset Meditation Circle — RSVP</h1>
  <form action="/submit" method="post">
    <label for="name">Full Name</label>
    <input id="name" name="name" type="text" required>

    <label for="email">Email</label>
    <input id="email" name="email" type="email">

    <label><input type="checkbox" name="updates" checked> Subscribe me to updates</label>

    <p>Cancellation: If you can't make it, please email cancel@sunsetmed.org.</p>
    <p>You can unsubscribe at any time.</p>
    <p>We never spam.</p>

    <button type="submit">RSVP</button>
  </form>
</body>
</html>
